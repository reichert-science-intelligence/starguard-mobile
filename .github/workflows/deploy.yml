# StarGuard Mobile Deploy — test always, deploy only on main push
# Pytest runs with PYTHONPATH=Artifacts/app for relative import requirement
name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e ".[dev]" 2>/dev/null || pip install Artifacts/requirements.txt

      - name: Ruff lint
        run: ruff check Artifacts/app/ --config pyproject.toml

      - name: Mypy type-check
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/Artifacts/app"
          mypy Artifacts/app/hedis_gap_trail.py Artifacts/app/suppression_banner.py Artifacts/app/hitl_admin_view.py --config-file pyproject.toml

      - name: Pytest (from Artifacts/ for relative imports)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/Artifacts/app:${GITHUB_WORKSPACE}"
          pytest tests/ -v --tb=short

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add hf https://rreichert:$HF_TOKEN@huggingface.co/spaces/rreichert/starguardai || true
          git remote set-url hf https://rreichert:$HF_TOKEN@huggingface.co/spaces/rreichert/starguardai
          git push hf main --force
