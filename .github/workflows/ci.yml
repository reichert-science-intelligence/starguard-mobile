# StarGuard Mobile CI — lint, type-check, pytest
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e ".[dev]" 2>/dev/null || pip install Artifacts/requirements.txt

      - name: Ruff lint
        run: ruff check Artifacts/app/ --config pyproject.toml || true

      - name: Mypy type-check
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/Artifacts/app"
          mypy Artifacts/app/hedis_gap_trail.py Artifacts/app/suppression_banner.py Artifacts/app/hitl_admin_view.py --config-file pyproject.toml || true

      - name: Pytest
        run: pytest tests/ -v --tb=short
